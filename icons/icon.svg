<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background gradient: deep navy -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1a2e"/>
      <stop offset="100%" stop-color="#08101d"/>
    </linearGradient>
    <!-- Accent gradient: blue to cyan -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b7cff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle inner glow -->
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="28" ry="28" fill="url(#bg)" stroke="rgba(91,124,255,0.3)" stroke-width="2"/>

  <!-- Camera body -->
  <rect x="24" y="36" width="80" height="58" rx="12" ry="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Lens outer ring -->
  <circle cx="64" cy="65" r="18" fill="none" stroke="url(#accent)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Lens inner -->
  <circle cx="64" cy="65" r="12" fill="rgba(91,124,255,0.15)" stroke="rgba(91,124,255,0.5)" stroke-width="1"/>

  <!-- Lens reflection highlight -->
  <circle cx="59" cy="60" r="4" fill="rgba(255,255,255,0.25)"/>

  <!-- Flash / sparkle element (represents AI generation) -->
  <g filter="url(#glow)">
    <path d="M96 30 L98 38 L106 40 L98 42 L96 50 L94 42 L86 40 L94 38 Z" fill="url(#accent)" opacity="0.9"/>
  </g>

  <!-- Bottom viewfinder bump -->
  <rect x="44" y="32" width="20" height="6" rx="3" ry="3" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Shutter button -->
  <circle cx="92" cy="38" r="4" fill="rgba(34,211,238,0.6)" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>

  <!-- Sparkle dots around lens (AI magic) -->
  <circle cx="38" cy="42" r="1.5" fill="rgba(34,211,238,0.5)"/>
  <circle cx="34" cy="55" r="1" fill="rgba(91,124,255,0.4)"/>
  <circle cx="88" cy="82" r="1.2" fill="rgba(34,211,238,0.4)"/>
  <circle cx="42" cy="80" r="1" fill="rgba(91,124,255,0.35)"/>
</svg>
