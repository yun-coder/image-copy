<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图生灵 设置</title>
  <link rel="stylesheet" href="./options.css" />
</head>

<body>
  <main class="page">
    <!-- Header -->
    <header class="site-header">
      <div class="site-header-inner">
        <p class="eyebrow">图生灵</p>
        <h1>设置</h1>
        <p class="subtitle">配置模型参数后即可开始使用。当前版本采用自备 API Key 模式，插件不会内置或提供 API Key。</p>
      </div>
    </header>

    <!-- Settings Cards -->
    <div class="settings-grid">
      <!-- Prompt Recognition Card -->
      <section class="card">
        <div class="card-head">
          <div class="card-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          </div>
          <div>
            <h2>提示词识别</h2>
            <p>识图服务商、URL、模型和 API Key 独立配置</p>
          </div>
        </div>

        <form id="settings-form" class="card-body">
          <label class="field">
            <span>识别图片模型</span>
            <input name="promptModel" type="text" placeholder="gemini-3.1-pro-preview" />
          </label>

          <label class="field">
            <span>识图 Base URL</span>
            <input name="promptBaseUrl" type="url" placeholder="https://generativelanguage.googleapis.com/v1beta" />
            <small id="prompt-base-url-help">Gemini 默认使用 Google 官方 REST 地址；切到 OpenAI Compatible 时会自动带入官方 API 地址。</small>
          </label>

          <label class="field">
            <span>识别图片模型 API Key</span>
            <input name="promptApiKey" type="password" placeholder="请填入你的 API Key" autocomplete="off" />
            <small>只保存在本地 <code>chrome.storage.local</code>，不会写入代码仓库。</small>
          </label>

          <label class="field toggle">
            <span>打开面板后自动识别</span>
            <input name="autoAnalyze" form="settings-form" type="checkbox" checked />
          </label>
        </form>
      </section>

      <!-- Image Generation Card -->
      <section class="card">
        <div class="card-head">
          <div class="card-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
          </div>
          <div>
            <h2>生图</h2>
            <p>生图服务商、URL、模型和 API Key 独立配置</p>
          </div>
        </div>

        <div class="card-body">
          <label class="field toggle">
            <span>开启生图功能</span>
            <input name="imageGenerationEnabled" form="settings-form" type="checkbox" />
          </label>

          <div id="image-settings-group" class="field-stack is-hidden">
            <label class="field">
              <span>生图模型</span>
              <input name="imageModel" type="text" placeholder="gemini-3.1-flash-image-preview" />
            </label>

            <label class="field">
              <span>生图 Base URL</span>
              <input name="imageBaseUrl" type="url" placeholder="https://generativelanguage.googleapis.com/v1beta" />
              <small id="image-base-url-help">Gemini 默认使用 Google 官方 REST 地址；切到 OpenAI Compatible 时会自动带入官方 API 地址。</small>
            </label>

            <label class="field">
              <span>生图模型 API Key</span>
              <input name="imageApiKey" type="password" placeholder="请填入你的 API Key" autocomplete="off" />
              <small>识图和生图可用同一个 Key，也可以完全分开。</small>
            </label>

            <label class="field" id="image-endpoint-group" style="display:none;">
              <span>生图端点路径</span>
              <input name="imageEndpointPath" type="text" placeholder="/images/generations" />
              <small>默认 <code>/images/generations</code>（兼容 OpenAI）。如果你用的第三方模型端点不同，请在此修改。</small>
            </label>
          </div>
        </div>
      </section>
    </div>

    <!-- Footer Actions -->
    <footer class="site-footer">
      <div class="site-footer-inner">
        <div class="actions">
          <button class="primary" type="submit" form="settings-form">保存设置</button>
          <button id="open-doc" type="button">查看文档</button>
        </div>
        <p id="status" class="status">读取设置中...</p>
      </div>
    </footer>
  </main>

  <script src="./options.js"></script>
</body>

</html>
