<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图透镜 Image Lens 设置</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero glass">
        <div>
          <p class="eyebrow">图透镜 Image Lens</p>
          <h1>填写模型配置后即可开始使用</h1>
          <p class="subtitle">当前版本采用自备 API Key 模式，插件不会内置或提供 API Key。</p>
        </div>
      </section>

      <section class="grid">
        <form id="settings-form" class="glass card">
          <section class="field-group">
            <div class="section-head">
              <h2>提示词识别</h2>
              <p>识图服务商、URL、模型和 API Key 独立配置，可与生图自由组合。</p>
            </div>

            <label class="field">
              <span>识图服务商</span>
              <select name="promptProvider">
                <option value="gemini">Gemini</option>
                <option value="openai-compatible">OpenAI Compatible</option>
              </select>
            </label>

            <label class="field">
              <span>识图 Base URL</span>
              <input name="promptBaseUrl" type="url" placeholder="https://generativelanguage.googleapis.com/v1beta" />
              <small id="prompt-base-url-help">Gemini 默认使用 Google 官方 REST 地址；切到 OpenAI Compatible 时会自动带入官方 API 地址。</small>
            </label>

            <label class="field">
              <span>识别图片模型 API Key</span>
              <input name="promptApiKey" type="password" placeholder="请填入你的 API Key" autocomplete="off" />
              <small>只保存在本地 `chrome.storage.local`，不会写入代码仓库。</small>
            </label>

            <label class="field">
              <span>识别图片模型</span>
              <input name="promptModel" type="text" placeholder="gemini-3.1-pro-preview" />
              <small id="prompt-model-help">Gemini 例如 `gemini-3.1-pro-preview`；OpenAI 兼容默认可用 `gpt-5.5`。</small>
            </label>

            <label class="field toggle">
              <span>打开面板后自动识别</span>
              <input name="autoAnalyze" form="settings-form" type="checkbox" />
            </label>
          </section>

          <section class="field-group">
            <div class="section-head">
              <h2>生图</h2>
              <p>生图服务商、URL、模型和 API Key 独立配置，可与识图自由组合。</p>
            </div>

            <label class="field toggle">
              <span>开启生图功能</span>
              <input name="imageGenerationEnabled" form="settings-form" type="checkbox" />
            </label>

            <div id="image-settings-group" class="field-stack">
              <label class="field">
                <span>生图服务商</span>
                <select name="imageProvider">
                  <option value="gemini">Gemini</option>
                  <option value="openai-compatible">OpenAI Compatible</option>
                </select>
              </label>

              <label class="field">
                <span>生图 Base URL</span>
                <input name="imageBaseUrl" type="url" placeholder="https://generativelanguage.googleapis.com/v1beta" />
                <small id="image-base-url-help">Gemini 默认使用 Google 官方 REST 地址；切到 OpenAI Compatible 时会自动带入官方 API 地址。</small>
              </label>

              <label class="field">
                <span>生图模型 API Key</span>
                <input name="imageApiKey" type="password" placeholder="请填入你的 API Key" autocomplete="off" />
                <small>识图和生图可用同一个 Key，也可以完全分开。</small>
              </label>

              <label class="field">
                <span>生图模型</span>
                <input name="imageModel" type="text" placeholder="gemini-3.1-flash-image-preview" />
                <small id="image-model-help">Gemini 例如 `gemini-3.1-flash-image-preview`；OpenAI 兼容默认可用 `gpt-image-2`。</small>
              </label>

              <label class="field" id="image-endpoint-group" style="display:none;">
                <span>生图端点路径</span>
                <input name="imageEndpointPath" type="text" placeholder="/images/generations" />
                <small>默认 `/images/generations`（兼容 OpenAI）。如果你用的第三方模型端点不同，请在此修改。</small>
              </label>
            </div>
          </section>

          <div class="actions">
            <button class="primary" type="submit">保存设置</button>
            <button id="open-doc" type="button">查看文档</button>
          </div>
          <p class="note">提示：这是一个自备 API Key 模式的插件，安装后需要填写自己的 API Key 才能使用。</p>
          <p id="status" class="status">读取设置中...</p>
        </form>
      </section>
    </main>

    <script src="./options.js"></script>
  </body>
</html>
